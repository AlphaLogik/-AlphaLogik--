<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Ventas</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef3f8;
}

h1{
    text-align:center;
    color:#0d47a1;
    margin-top:30px;
}

.descripcion{
    text-align:center;
    color:#555;
    margin-bottom:30px;
}

.contenedor{
    display:flex;
    justify-content:center;
    gap:35px;
    flex-wrap:wrap;
    margin:30px;
}

.tarjeta{
    width:400px;
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
    transition:.3s;
}

.tarjeta:hover{
    transform:translateY(-5px);
}

.tarjeta img{
    width:100%;
    height:230px;
    object-fit:cover;
}

.tarjeta h2{
    text-align:center;
    color:#0d47a1;
}

.tarjeta p{
    padding:20px;
    text-align:justify;
    line-height:1.6;
}

.boton{
    text-align:center;
    margin:30px;
}

.boton a{
    display:inline-block;
    background:#0d47a1;
    color:white;
    text-decoration:none;
    padding:12px;
    border-radius:8px;
    font-size:12px;
    font-weight:bold;
    transition:.3s;
}

.boton a:hover{
    background:#1565c0;
    transform:scale(1.05);
}

</style>

</head>

<body>
<center>

	<img src="../imagenes/ventas.jpg" width=1500px alt="Ventas">

</center>

</div>

</div>

			</div>

</body>
</html>
