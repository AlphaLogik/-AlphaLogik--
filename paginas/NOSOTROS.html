<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>NOSOTROS</title>
<style>
	body{
		font-family: Constantia, "Lucida Bright", "DejaVu Serif", Georgia, "serif";
	    background: #f4f7fc;
		margin:0;
		padding:40px
	}
	.nosotros{
		width:80%;
		max-width:700px;
		margin:auto;
	}
	.tarjeta{
		background: #ffffff;
		border-radius: 20px;
		padding: 35px;
		box-shadow: 0 8px rgba(0,0,0,.15);
		text-align:center;
	}
	.tarjeta h2{
		color: darkblue;
		margin-bottom: 20px;
	}
	.tarjeta p{
		text-align: justify;
		font-size: 18px;
		line-height: 1.8;
		color: #3F3F3F
	}
	.boton {
		text-align: center;
		margin-top: 35px;
	}
	.boton a{
		display: inline-block;
		background: #0d47a1;
		color: white;
		text-decoration: none;
		padding: 15px 30px;
		border-radius:10px;
		font-size: 16px;
		font-weight: bold;
		transition:.3s;
	}
	.boton a:hover {
		background: #1565c0;
		transform: scale(1.05)
	}
</style>
</head>
<body>
	<section class="nosotros">
		<div class="tarjeta">
			<h2>ALPHA LOGIK</h2>
			<p>
				En Alpha Logik somos una empresa dedicada al soporte técnico, mantenimiento de equipos de cómputo, venta de hardware y software, y asesorías tecnológicas. Trabajamos con un solo objetivo: que la tecnología de nuestros clientes funcione bien, siempre.
			</p>
			<div class="boton">
				<a href="javascript:history.back()"> REGRESAR </a>
			</div>
		</div>
	</section>
</body>
</html>
